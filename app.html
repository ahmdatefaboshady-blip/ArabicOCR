<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arabic OCR — تطبيق الويب</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07090f;
  --s1:      #0d1117;
  --s2:      #161b22;
  --s3:      #1c2333;
  --border:  #21262d;
  --accent:  #00d084;
  --blue:    #388bfd;
  --yellow:  #d29922;
  --red:     #f85149;
  --text:    #e6edf3;
  --muted:   #7d8590;
  --glow:    rgba(0,208,132,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"IBM Plex Sans Arabic",sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  line-height:1.6;
}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 10%, rgba(0,208,132,.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(56,139,253,.05) 0%,transparent 60%);
}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
  background:rgba(7,9,15,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--accent);text-decoration:none}
.topbar-logo span{color:var(--text);font-weight:400;font-size:13px}
.topbar-right{display:flex;align-items:center;gap:10px}
.lang-sel{
  background:var(--s2);color:var(--text);
  border:1px solid var(--border);border-radius:7px;
  padding:5px 10px;font-size:12px;cursor:pointer;outline:none;
  font-family:inherit;
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  color:var(--muted);text-decoration:none;font-size:12px;
  padding:5px 12px;border:1px solid var(--border);border-radius:7px;
  transition:all .2s;background:var(--s2);
}
.back-btn:hover{color:var(--text);border-color:var(--accent)}

/* ── LAYOUT ── */
.app-wrap{
  display:grid;
  grid-template-columns:300px 1fr;
  grid-template-rows:1fr;
  height:calc(100vh - 52px);
  position:relative;z-index:1;
}
@media(max-width:768px){
  .app-wrap{grid-template-columns:1fr;grid-template-rows:auto 1fr}
}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--s1);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-section{
  padding:12px 14px 8px;
  border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:var(--muted);text-transform:uppercase;
}

/* API Key */
.api-wrap{padding:12px 14px;border-bottom:1px solid var(--border)}
.api-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.api-row{display:flex;gap:6px}
.api-input{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px;color:var(--text);
  font-family:"JetBrains Mono",monospace;font-size:11px;outline:none;
  transition:border-color .2s;
}
.api-input:focus{border-color:var(--accent)}
.api-input::placeholder{color:var(--muted)}
.icon-btn{
  background:var(--s2);border:1px solid var(--border);border-radius:7px;
  color:var(--muted);cursor:pointer;padding:0 10px;font-size:14px;
  transition:all .2s;white-space:nowrap;
}
.icon-btn:hover{color:var(--text);border-color:var(--blue)}
.api-status{font-size:10px;margin-top:5px;height:14px}
.api-status.ok{color:var(--accent)}
.api-status.err{color:var(--red)}

/* Drop Zone */
.drop-zone{
  margin:12px 14px;
  border:2px dashed var(--border);border-radius:10px;
  padding:20px 12px;text-align:center;cursor:pointer;
  transition:all .25s;position:relative;
  background:var(--bg);
}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(0,208,132,.04)}
.drop-zone input{display:none}
.drop-icon{font-size:28px;margin-bottom:8px}
.drop-text{font-size:12px;color:var(--muted);line-height:1.6}
.drop-text strong{color:var(--accent)}

/* File List */
.file-list{flex:1;overflow-y:auto;padding:8px 10px}
.file-list::-webkit-scrollbar{width:4px}
.file-list::-webkit-scrollbar-track{background:transparent}
.file-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.file-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:8px;margin-bottom:4px;
  background:var(--s2);border:1px solid var(--border);
  transition:border-color .2s;
}
.file-item.done{border-color:rgba(0,208,132,.3)}
.file-item.error{border-color:rgba(248,81,73,.3)}
.file-item.active{border-color:var(--blue);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{border-color:var(--blue)}50%{border-color:rgba(56,139,253,.3)}}
.file-icon{font-size:18px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:10px;color:var(--muted)}
.file-status{font-size:18px;flex-shrink:0}
.remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px;opacity:0;transition:opacity .2s}
.file-item:hover .remove-btn{opacity:1}

/* Options */
.options-wrap{padding:10px 14px;border-top:1px solid var(--border)}
.opt-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.opt-label{font-size:12px;color:var(--text)}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;background:var(--border);border-radius:10px;transition:.3s;
}
.toggle input:checked + .toggle-track{background:var(--accent)}
.toggle-thumb{
  position:absolute;top:3px;right:3px;width:14px;height:14px;
  background:#fff;border-radius:50%;transition:.3s;
}
.toggle input:checked ~ .toggle-thumb{right:19px}

/* Run Button */
.run-btn{
  margin:10px 14px 14px;
  background:linear-gradient(135deg,var(--accent),#00b874);
  color:#000;border:none;border-radius:9px;padding:11px;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .25s;box-shadow:0 0 20px var(--glow);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.run-btn:hover{transform:translateY(-1px);box-shadow:0 0 32px var(--glow)}
.run-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.stop-btn{
  background:rgba(248,81,73,.15);color:var(--red);
  border:1px solid rgba(248,81,73,.3);
}
.stop-btn:hover{background:rgba(248,81,73,.25)}

/* ── MAIN AREA ── */
.main{
  display:flex;flex-direction:column;
  background:var(--bg);overflow:hidden;
}

/* Progress Bar */
.prog-bar-wrap{
  padding:10px 16px;border-bottom:1px solid var(--border);
  background:var(--s1);display:flex;align-items:center;gap:12px;
}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:2px;transition:width .4s ease;width:0%}
.prog-label{font-size:11px;color:var(--muted);white-space:nowrap;min-width:120px;text-align:left}

/* Result Tabs */
.tabs{
  display:flex;gap:0;border-bottom:1px solid var(--border);
  background:var(--s1);padding:0 16px;overflow-x:auto;
}
.tab{
  padding:10px 16px;font-size:12px;font-weight:600;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
  background:none;border-top:none;border-right:none;border-left:none;
  font-family:inherit;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Result Box */
.result-wrap{flex:1;overflow:hidden;position:relative}
.result-box{
  width:100%;height:100%;
  background:var(--bg);color:var(--text);
  border:none;outline:none;resize:none;
  font-family:"JetBrains Mono",monospace;font-size:13px;
  padding:20px;line-height:1.8;
  direction:rtl;text-align:right;
}
.result-placeholder{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;pointer-events:none;
  color:var(--muted);text-align:center;
}
.result-placeholder .big{font-size:48px}
.result-placeholder p{font-size:14px;max-width:280px;line-height:1.7}

/* Bottom Toolbar */
.bottom-bar{
  padding:8px 16px;border-top:1px solid var(--border);
  background:var(--s1);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.action-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);border-radius:7px;padding:6px 14px;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.action-btn:hover{border-color:var(--blue);color:var(--blue)}
.action-btn.green:hover{border-color:var(--accent);color:var(--accent)}
.stats-info{margin-right:auto;font-size:11px;color:var(--muted)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:13px;z-index:999;
  opacity:0;transition:all .3s;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(0,208,132,.4);color:var(--accent)}
.toast.err{border-color:rgba(248,81,73,.4);color:var(--red)}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{border-left:none;border-bottom:1px solid var(--border);max-height:55vh}
  .app-wrap{height:auto;min-height:calc(100vh - 52px)}
  .main{min-height:50vh}
  .result-box{font-size:12px}
}
</style>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">📄 Arabic OCR <span>| تطبيق الويب</span></a>
  <div class="topbar-right">
    <select class="lang-sel" id="langSel">
      <option value="ar">🇸🇦 العربية</option>
      <option value="en">🇬🇧 English</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="es">🇪🇸 Español</option>
      <option value="tr">🇹🇷 Türkçe</option>
      <option value="id">🇮🇩 Indonesia</option>
      <option value="ur">🇵🇰 اردو</option>
    </select>
    <a href="index.html" class="back-btn">← <span data-t="back">الصفحة الرئيسية</span></a>
  </div>
</div>

<!-- APP -->
<div class="app-wrap">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- API Key -->
    <div class="api-wrap">
      <div class="api-label">
        <span data-t="api_key">مفتاح Mistral API</span>
        <a href="https://console.mistral.ai" target="_blank" style="color:var(--blue);font-size:10px;text-decoration:none" data-t="get_key">احصل عليه مجاناً ↗</a>
      </div>
      <div class="api-row">
        <input type="password" class="api-input" id="apiKey" placeholder="sk-..." autocomplete="off">
        <button class="icon-btn" id="toggleKey" title="إظهار/إخفاء">👁</button>
      </div>
      <div class="api-status" id="apiStatus"></div>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📂</div>
      <div class="drop-text"><strong data-t="drop_strong">اسحب PDF هنا</strong><br><span data-t="drop_or">أو انقر للاختيار</span></div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" multiple style="display:none">

    <!-- File List -->
    <div class="sidebar-section" data-t="files_section">الملفات</div>
    <div class="file-list" id="fileList">
      <div style="text-align:center;padding:20px;color:var(--muted);font-size:12px" data-t="no_files" id="noFilesMsg">لا توجد ملفات بعد</div>
    </div>

    <!-- Options -->
    <div class="options-wrap">
      <div class="opt-row">
        <span class="opt-label" data-t="opt_images">استخراج الصور</span>
        <label class="toggle">
          <input type="checkbox" id="optImages">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="opt-row">
        <span class="opt-label" data-t="opt_autoscroll">تمرير تلقائي</span>
        <label class="toggle">
          <input type="checkbox" id="optScroll" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Run Button -->
    <button class="run-btn" id="runBtn" disabled>
      <span>⚡</span> <span data-t="run_ocr">تشغيل OCR</span>
    </button>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- Progress -->
    <div class="prog-bar-wrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-label" id="progLabel" data-t="waiting">في الانتظار...</div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabsBar"></div>

    <!-- Result -->
    <div class="result-wrap">
      <div class="result-placeholder" id="placeholder">
        <div class="big">✨</div>
        <p data-t="placeholder_text">أضف ملفات PDF من الشريط الجانبي ثم اضغط تشغيل OCR</p>
      </div>
      <textarea class="result-box" id="resultBox" readonly style="display:none"></textarea>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <span class="stats-info" id="statsInfo"></span>
      <button class="action-btn" id="copyBtn" onclick="copyResult()">📋 <span data-t="copy">نسخ</span></button>
      <button class="action-btn green" id="dlMd" onclick="downloadResult('md')">💾 <span data-t="dl_md">تحميل .md</span></button>
      <button class="action-btn green" id="dlTxt" onclick="downloadResult('txt')">📄 <span data-t="dl_txt">تحميل .txt</span></button>
      <button class="action-btn" id="dlDocx" onclick="showDocxDialog()" style="border-color:#1a3a5c;color:#388bfd">📝 <span data-t="dl_docx">تحميل .docx</span></button>
      <button class="action-btn" onclick="showCorrectDialog()" style="border-color:#4c1d95;color:#a78bfa">🧠 <span data-t="smart_correct">تصحيح ذكي</span></button>
    </div>

  </div>
</div>



<!-- Smart Correct Dialog -->
<div id="correctDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#0d1117;border:1px solid #21262d;border-radius:16px;padding:0;min-width:360px;max-width:420px;overflow:hidden">
    <div style="background:#161b22;padding:16px 20px;border-bottom:1px solid #21262d">
      <div style="font-size:15px;font-weight:700;color:#e6edf3" id="correctDialogTitle">🧠 تصحيح ذكي</div>
    </div>
    <div style="padding:20px">

      <!-- نطاق التصحيح -->
      <div style="font-size:11px;font-weight:700;color:#7d8590;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px" id="correctScopeLabel">النطاق</div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <label style="flex:1;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#e6edf3;transition:border-color .2s" id="scopeCurrentLabel">
          <input type="radio" name="correctScope" value="current" checked style="accent-color:#7c3aed"> <span id="scopeCurrentText">الملف الحالي</span>
        </label>
        <label style="flex:1;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#e6edf3;transition:border-color .2s" id="scopeAllLabel">
          <input type="radio" name="correctScope" value="all" style="accent-color:#7c3aed"> <span id="scopeAllText">كل الملفات</span>
        </label>
      </div>

      <!-- اختيار النموذج -->
      <div style="font-size:11px;font-weight:700;color:#7d8590;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px" id="correctApiLabel">النموذج</div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <label style="flex:1;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#e6edf3" id="apiMistralLabel">
          <input type="radio" name="correctApi" value="mistral" checked style="accent-color:#7c3aed"> <span id="apiMistralText">Mistral</span>
        </label>
        <label style="flex:1;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#e6edf3" id="apiClaudeLabel">
          <input type="radio" name="correctApi" value="claude" style="accent-color:#7c3aed"> <span id="apiClaudeText">Claude</span>
        </label>
      </div>

      <!-- مفتاح Claude -->
      <div style="margin-bottom:16px">
        <div style="font-size:11px;color:#7d8590;margin-bottom:6px" id="claudeKeyLabel">مفتاح Claude API</div>
        <input type="password" id="claudeKeyInput" placeholder="sk-ant-..."
          style="width:100%;background:#07090f;border:1px solid #21262d;border-radius:7px;padding:8px 12px;color:#e6edf3;font-family:monospace;font-size:11px;outline:none;box-sizing:border-box">
      </div>

      <!-- شريط التقدم -->
      <div id="correctProgWrap" style="display:none;margin-bottom:16px">
        <div style="font-size:11px;color:#7d8590;margin-bottom:6px" id="correctProgLabel"></div>
        <div style="background:#21262d;border-radius:4px;height:4px;overflow:hidden">
          <div id="correctProgFill" style="background:#7c3aed;height:100%;width:0%;transition:width .4s"></div>
        </div>
      </div>

      <!-- أزرار -->
      <div style="display:flex;gap:10px">
        <button onclick="runSmartCorrect()" id="correctRunBtn"
          style="flex:1;background:#7c3aed;border:none;border-radius:9px;padding:12px;color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:all .2s"
          onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#7c3aed'"
          id="correctRunBtnEl">✨ تصحيح الآن</button>
        <button onclick="document.getElementById('correctDialog').style.display='none'"
          style="background:#161b22;border:1px solid #21262d;border-radius:9px;padding:12px 16px;color:#7d8590;cursor:pointer;font-family:inherit;font-size:13px">✕</button>
      </div>
    </div>
  </div>
</div>

<!-- DOCX Dialog -->
<div id="docxDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center">
  <div style="background:#0f1520;border:1px solid #21262d;border-radius:14px;padding:32px;min-width:300px;text-align:center">
    <div style="font-size:15px;font-weight:700;margin-bottom:20px;color:#e6edf3" id="docxDialogTitle">اختر نوع تصدير DOCX</div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button onclick="downloadDocx(false)" style="flex:1;background:#1c2333;border:1px solid #21262d;border-radius:9px;padding:14px;color:#e6edf3;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s" onmouseover="this.style.borderColor='#388bfd'" onmouseout="this.style.borderColor='#21262d'" id="docxSimpleBtn">📄 نص بسيط</button>
      <button onclick="downloadDocx(true)"  style="flex:1;background:#1a3a5c;border:1px solid #1a3a5c;border-radius:9px;padding:14px;color:#e6edf3;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s" onmouseover="this.style.background='#2ea043'" onmouseout="this.style.background='#1a3a5c'" id="docxStyledBtn">✨ منسق بالكامل</button>
    </div>
    <button onclick="document.getElementById('docxDialog').style.display='none'" style="margin-top:16px;background:none;border:none;color:#7d8590;cursor:pointer;font-family:inherit;font-size:13px">إلغاء</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
//   TRANSLATIONS

//   STATE
// ══════════════════════════════════════════
let lang      = localStorage.getItem("ocr_lang") || "ar";
let files     = [];   // {file, name, status, result}
let results   = {};   // name → text
let activeTab = null;
let running   = false;
let stopFlag  = false;

// ══════════════════════════════════════════
//   LANGUAGE
// ══════════════════════════════════════════
function t(key){ return (T[lang]||T.ar)[key] || key; }

function applyLang(l){
  lang = l;
  localStorage.setItem("ocr_lang", l);
  const rtl = ["ar","ur"].includes(l);
  document.documentElement.dir = rtl ? "rtl" : "ltr";
  document.documentElement.lang = l;
  document.querySelectorAll("[data-t]").forEach(el=>{
    const k = el.getAttribute("data-t");
    if(T[l] && T[l][k]) el.textContent = T[l][k];
  });
  document.getElementById("langSel").value = l;
  updateUI();
}

document.getElementById("langSel").addEventListener("change", e => applyLang(e.target.value));

// ══════════════════════════════════════════
//   API KEY
// ══════════════════════════════════════════
const apiKeyEl = document.getElementById("apiKey");
const apiStatus = document.getElementById("apiStatus");

// Load saved key
apiKeyEl.value = localStorage.getItem("ocr_api_key") || "";

apiKeyEl.addEventListener("input", ()=>{
  const v = apiKeyEl.value.trim();
  localStorage.setItem("ocr_api_key", v);
  if(v.length > 10){
    apiStatus.textContent = t("api_saved");
    apiStatus.className = "api-status ok";
  } else {
    apiStatus.textContent = "";
  }
  updateRunBtn();
});

document.getElementById("toggleKey").addEventListener("click", ()=>{
  apiKeyEl.type = apiKeyEl.type === "password" ? "text" : "password";
});

// ══════════════════════════════════════════
//   FILE HANDLING
// ══════════════════════════════════════════
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

// ── النقر على dropZone يفتح fileInput ──
dropZone.addEventListener("click", () => fileInput.click());

// ── السحب والإفلات ──
dropZone.addEventListener("dragover",  e => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add("drag"); });
dropZone.addEventListener("dragleave", e => { e.stopPropagation(); if(!dropZone.contains(e.relatedTarget)) dropZone.classList.remove("drag"); });
dropZone.addEventListener("drop",      e => {
  e.preventDefault(); e.stopPropagation();
  dropZone.classList.remove("drag");
  const dropped = [...(e.dataTransfer.files||[])].filter(f => f.name.toLowerCase().endsWith(".pdf"));
  dropped.length ? addFiles(dropped) : showToast("يرجى إرفاق ملفات PDF فقط", "err");
});

// ── اختيار الملف من مربع الحوار ──
fileInput.addEventListener("change", function() {
  if(this.files && this.files.length > 0) {
    addFiles([...this.files]);
  }
  this.value = "";
});

function addFiles(newFiles){
  newFiles.forEach(f=>{
    if(!files.find(x=>x.name===f.name)){
      files.push({file:f, name:f.name, status:"pending", result:""});
    }
  });
  renderFileList();
  updateRunBtn();
}

function renderFileList(){
  const list = document.getElementById("fileList");
  const noMsg = document.getElementById("noFilesMsg");
  if(files.length === 0){
    list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">${t("no_files")}</div>`;
    return;
  }
  list.innerHTML = files.map((f,i)=>{
    const kb = Math.round(f.file.size/1024);
    const icon = f.status==="done" ? "✅" : f.status==="error" ? "❌" : f.status==="active" ? "⏳" : "📕";
    const cls  = f.status==="done" ? "done" : f.status==="error" ? "error" : f.status==="active" ? "active" : "";
    return `<div class="file-item ${cls}" onclick="showTab('${f.name}')">
      <span class="file-icon">${icon}</span>
      <div class="file-info">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-size">${kb} KB</div>
      </div>
      <button class="remove-btn" onclick="removeFile(event,${i})">✕</button>
    </div>`;
  }).join("");
}

function removeFile(e, i){
  e.stopPropagation();
  const name = files[i].name;
  files.splice(i, 1);
  delete results[name];
  renderFileList();
  renderTabs();
  updateRunBtn();
  if(activeTab === name){
    activeTab = files.length ? files[files.length-1].name : null;
    showTab(activeTab);
  }
}

// ══════════════════════════════════════════
//   TABS
// ══════════════════════════════════════════
function renderTabs(){
  const bar = document.getElementById("tabsBar");
  const doneFiles = files.filter(f=>f.status==="done"||f.status==="error");
  if(doneFiles.length === 0){ bar.innerHTML=""; return; }
  bar.innerHTML = doneFiles.map(f=>`
    <button class="tab ${activeTab===f.name?'active':''}" onclick="showTab('${f.name}')">
      ${f.status==="error"?"❌":"✅"} ${f.name.replace(".pdf","")}
    </button>`).join("");
}

function showTab(name){
  if(!name) return;
  activeTab = name;
  renderTabs();
  const text = results[name] || "";
  const box = document.getElementById("resultBox");
  const ph  = document.getElementById("placeholder");
  if(text){
    box.style.display = "block";
    ph.style.display  = "none";
    box.value = text;
    updateStats(text);
  }
}

function updateStats(text){
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  const chars = text.length;
  document.getElementById("statsInfo").textContent = `${words.toLocaleString()} ${t("words")} · ${chars.toLocaleString()} chars`;
}

// ══════════════════════════════════════════
//   OCR ENGINE
// ══════════════════════════════════════════
document.getElementById("runBtn").addEventListener("click", ()=>{
  if(running){ stopFlag=true; return; }
  runOCR();
});

async function runOCR(){
  const key = apiKeyEl.value.trim();
  if(!key || files.filter(f=>f.status==="pending").length===0) return;

  running   = true;
  stopFlag  = false;
  const runBtn = document.getElementById("runBtn");
  runBtn.innerHTML = `<span>⏹</span> <span>${t("run_ocr").replace("تشغيل","إيقاف")}</span>`;
  runBtn.classList.add("stop-btn");

  const pending = files.filter(f=>f.status==="pending");
  const total   = pending.length;

  for(let i=0; i<pending.length; i++){
    if(stopFlag) break;
    const f = pending[i];
    f.status = "active";
    renderFileList();
    setProgress((i/total)*100, `${t("processing")}: ${f.name} (${i+1}/${total})`);

    try {
      const b64 = await fileToBase64(f.file);
      const res = await fetch("https://api.mistral.ai/v1/ocr", {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
        body: JSON.stringify({
          model: "mistral-ocr-latest",
          document: { type:"document_url", document_url:`data:application/pdf;base64,${b64}` },
          include_image_base64: document.getElementById("optImages").checked
        })
      });

      if(!res.ok){
        const err = await res.json().catch(()=>({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const text = (data.pages||[]).map((p,pi)=>
        `\n\n${"─".repeat(40)}\n${t("page")} ${pi+1}\n${"─".repeat(40)}\n\n${p.markdown||""}`
      ).join("");

      f.status = "done";
      f.result = text;
      results[f.name] = text;
      if(!activeTab) activeTab = f.name;

    } catch(err){
      f.status = "error";
      results[f.name] = `${t("error")}: ${err.message}`;
    }

    renderFileList();
    renderTabs();
    if(document.getElementById("optScroll").checked && activeTab===f.name){
      showTab(f.name);
    } else if(activeTab===f.name || !activeTab){
      showTab(f.name);
    }
    setProgress(((i+1)/total)*100, `${t("done")} — ${f.name}`);
  }

  running = false;
  stopFlag = false;
  runBtn.innerHTML = `<span>⚡</span> <span>${t("run_ocr")}</span>`;
  runBtn.classList.remove("stop-btn");
  updateRunBtn();
  setProgress(100, `${t("done")} — ${Object.keys(results).length} ${t("files_section")}`);
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload  = ()=> res(r.result.split(",")[1]);
    r.onerror = ()=> rej(new Error("Read failed"));
    r.readAsDataURL(file);
  });
}

// ══════════════════════════════════════════
//   UTILITIES
// ══════════════════════════════════════════
function setProgress(pct, label){
  document.getElementById("progFill").style.width = pct+"%";
  document.getElementById("progLabel").textContent = label;
}

function updateRunBtn(){
  const btn = document.getElementById("runBtn");
  const hasFiles = files.some(f=>f.status==="pending");
  const hasKey   = apiKeyEl.value.trim().length > 10;
  btn.disabled = !hasFiles || !hasKey;
}

function updateUI(){
  renderFileList();
  renderTabs();
  if(activeTab) showTab(activeTab);
}

function copyResult(){
  const text = document.getElementById("resultBox").value;
  if(!text){ showToast(t("no_results"), "err"); return; }
  navigator.clipboard.writeText(text).then(()=> showToast(t("copied"), "ok"));
}

function downloadResult(ext){
  const text = document.getElementById("resultBox").value;
  if(!text){ showToast(t("no_results"), "err"); return; }
  const name = (activeTab||"result").replace(".pdf","");
  const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${name}.${ext}`;
  a.click();
}

function showToast(msg, type="ok"){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(()=> el.classList.remove("show"), 2500);
}

function showCorrectDialog(){
  const text = document.getElementById("resultBox").value;
  if(!text){ showToast(t("no_results"), "err"); return; }

  // تحديث النصوص حسب اللغة
  document.getElementById("correctDialogTitle").textContent = "🧠 " + t("correct_title");
  document.getElementById("scopeCurrentText").textContent   = t("correct_scope_current");
  document.getElementById("scopeAllText").textContent       = t("correct_scope_all");
  document.getElementById("apiMistralText").textContent     = t("correct_api_mistral");
  document.getElementById("apiClaudeText").textContent      = t("correct_api_claude");
  document.getElementById("claudeKeyLabel").textContent     = t("correct_claude_key");
  document.getElementById("correctRunBtn").textContent      = t("correct_run");

  // تحميل مفتاح Claude المحفوظ
  const savedClaude = localStorage.getItem("ocr_claude_key") || "";
  document.getElementById("claudeKeyInput").value = savedClaude;

  const dlg = document.getElementById("correctDialog");

  dlg.onclick = e => { if(e.target===dlg) dlg.style.display="none"; };

document.getElementById("claudeKeyInput").addEventListener("input", function(){
  localStorage.setItem("ocr_claude_key", this.value.trim());
});

async function runSmartCorrect(){
  const scope     = document.querySelector('input[name="correctScope"]:checked').value;
  const apiChoice = document.querySelector('input[name="correctApi"]:checked').value;
  const mistralKey = document.getElementById("apiKey").value.trim();
  const claudeKey  = document.getElementById("claudeKeyInput").value.trim();

  if(apiChoice === "claude" && !claudeKey){
    showToast("أدخل مفتاح Claude API!", "err"); return;
  }
  if(apiChoice === "mistral" && !mistralKey){
    showToast("أدخل مفتاح Mistral API!", "err"); return;
  }

  // تحديد الملفات
  const targets = {};
  if(scope === "current" && activeTab){
    targets[activeTab] = results[activeTab] || "";
  } else {
    Object.assign(targets, results);
  }

  if(Object.keys(targets).length === 0){
    showToast(t("no_results"), "err"); return;
  }

  const runBtn = document.getElementById("correctRunBtn");
  const progWrap = document.getElementById("correctProgWrap");
  const progFill = document.getElementById("correctProgFill");
  const progLabel = document.getElementById("correctProgLabel");

  runBtn.disabled = true;
  runBtn.textContent = t("correcting");
  progWrap.style.display = "block";

  const entries  = Object.entries(targets);
  const total    = entries.length;
  const corrected = {};

  const prompt_template = (text) =>
    "أنت مصحح نصوص عربي محترف متخصص في تصحيح أخطاء OCR.
" +
    "مهمتك: صحّح النص التالي المستخرج من PDF بدقة عالية.

" +
    "قواعد مهمة جداً:
" +
    "١. صحّح الكلمات الخاطئة بفهم السياق.
" +
    "٢. أكمل الكلمات المقطوعة بسبب OCR.
" +
    "٣. صحّح علامات الترقيم.
" +
    "٤. حافظ على التنسيق الأصلي.
" +
    "٥. أعد النص المصحح فقط بدون أي مقدمة.

" +
    "النص:
" + text;

  for(let i=0; i<entries.length; i++){
    const [name, text] = entries[i];
    progLabel.textContent = `${t("correcting")} ${name} (${i+1}/${total})`;
    progFill.style.width = ((i/total)*100) + "%";

    try {
      let correctedText = "";

      if(apiChoice === "mistral"){
        const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
          method: "POST",
          headers: {"Content-Type":"application/json", "Authorization":`Bearer ${mistralKey}`},
          body: JSON.stringify({
            model: "mistral-large-latest",
            messages: [{ role:"user", content: prompt_template(text) }],
            max_tokens: 8192
          })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
        correctedText = data.choices[0].message.content;

      } else {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type":"application/json",
            "x-api-key": claudeKey,
            "anthropic-version":"2023-06-01"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 8192,
            messages: [{ role:"user", content: prompt_template(text) }]
          })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
        correctedText = data.content[0].text;
      }

      corrected[name] = correctedText;
      results[name]   = correctedText;

    } catch(err) {
      corrected[name] = `[${t("correct_err")}: ${err.message}]

${text}`;
      results[name]   = corrected[name];
    }

    progFill.style.width = (((i+1)/total)*100) + "%";
  }

  // عرض النتيجة
  if(activeTab && corrected[activeTab]){
    const box = document.getElementById("resultBox");
    box.value = corrected[activeTab];
    updateStats(corrected[activeTab]);
  }

  progLabel.textContent = t("correct_done");
  runBtn.disabled = false;
  runBtn.textContent = t("correct_run");
  showToast(t("correct_done"), "ok");

  setTimeout(()=>{
    document.getElementById("correctDialog").style.display = "none";
    document.getElementById("correctProgWrap").style.display = "none";
    progFill.style.width = "0%";
  }, 1500);
}

// ══════════════════════════════════════════
//   DOCX EXPORT (client-side via docx.js)
// ══════════════════════════════════════════
function showDocxDialog(){
  const text = document.getElementById("resultBox").value;
  if(!text){ showToast(t("no_results"), "err"); return; }
  // update dialog labels
  document.getElementById("docxDialogTitle").textContent = t("docx_choose");
  document.getElementById("docxSimpleBtn").textContent   = t("docx_simple");
  document.getElementById("docxStyledBtn").textContent   = t("docx_styled");
  const dlg = document.getElementById("docxDialog");
  dlg.style.display = "flex";
  dlg.onclick = e => { if(e.target===dlg) dlg.style.display="none"; };
}

async function downloadDocx(styled){
  document.getElementById("docxDialog").style.display = "none";
  const text = document.getElementById("resultBox").value;
  if(!text){ showToast(t("no_results"), "err"); return; }

  showToast("⏳ جارٍ إنشاء الملف...", "ok");

  // استخدام مكتبة docx المحملة مسبقاً
  if(!window.docx){
    showToast("❌ مكتبة docx غير محملة، أعد تحميل الصفحة", "err");
    return;
  }
  const { Document, Packer, Paragraph, TextRun, HeadingLevel,
          AlignmentType, PageOrientation, BorderStyle } = window.docx;

  const children = [];
  const isRTL = ["ar","ur"].includes(lang);

  const makeP = (text, opts={}) => new Paragraph({
    bidirectional: isRTL,
    alignment: isRTL ? AlignmentType.RIGHT : AlignmentType.LEFT,
    ...opts,
    children: [new TextRun({
      text,
      font: isRTL ? "Arial" : "Calibri",
      size: opts.size || 24,
      bold: opts.bold || false,
      color: opts.color || "000000",
      ...( isRTL ? {rightToLeft: true} : {} )
    })]
  });

  const lines = text.split("\n");

  if(styled){
    // ── عنوان المستند ──
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_1,
      bidirectional: isRTL,
      alignment: isRTL ? AlignmentType.RIGHT : AlignmentType.LEFT,
      children:[new TextRun({
        text: activeTab || "OCR Result",
        font:"Arial", size:36, bold:true, color:"00D084",
        ...(isRTL?{rightToLeft:true}:{})
      })]
    }));
    children.push(makeP(new Date().toLocaleString(), {size:18, color:"7d8590"}));
    children.push(makeP(""));

    for(const line of lines){
      const s = line.trim();
      if(s.startsWith("## ")){
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_2, bidirectional:isRTL,
          alignment: isRTL?AlignmentType.RIGHT:AlignmentType.LEFT,
          children:[new TextRun({text:s.slice(3),font:"Arial",size:28,bold:true,color:"388BFD",...(isRTL?{rightToLeft:true}:{})})]
        }));
      } else if(s.startsWith("# ")){
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_2, bidirectional:isRTL,
          alignment: isRTL?AlignmentType.RIGHT:AlignmentType.LEFT,
          children:[new TextRun({text:s.slice(2),font:"Arial",size:30,bold:true,color:"388BFD",...(isRTL?{rightToLeft:true}:{})})]
        }));
      } else if(/^─+/.test(s)){
        children.push(new Paragraph({
          bidirectional:isRTL,
          border:{bottom:{style:BorderStyle.SINGLE,size:6,color:"21262D",space:1}},
          children:[]
        }));
      } else if(s===""){
        children.push(makeP(""));
      } else {
        // bold support **text**
        const parts = s.split(/(\*\*[^*]+\*\*)/g);
        const runs = parts.map(p=>{
          const isBold = p.startsWith("**") && p.endsWith("**");
          return new TextRun({
            text: isBold ? p.slice(2,-2) : p,
            bold: isBold, font:"Arial", size:24,
            ...(isRTL?{rightToLeft:true}:{})
          });
        });
        children.push(new Paragraph({
          bidirectional:isRTL,
          alignment:isRTL?AlignmentType.RIGHT:AlignmentType.LEFT,
          children:runs
        }));
      }
    }
  } else {
    // ── وضع بسيط ──
    children.push(new Paragraph({
      heading:HeadingLevel.HEADING_1, bidirectional:isRTL,
      alignment:isRTL?AlignmentType.RIGHT:AlignmentType.LEFT,
      children:[new TextRun({text:activeTab||"OCR Result",font:"Arial",size:32,bold:true,...(isRTL?{rightToLeft:true}:{})})]
    }));
    const clean = text
      .replace(/^#{1,6}\s+/gm,"")
      .replace(/\*\*([^*]+)\*\*/g,"$1")
      .replace(/^─+.*$/gm,"")
      .replace(/^\|.*$/gm,"");
    for(const line of clean.split("\n")){
      children.push(makeP(line));
    }
  }

  const doc = new Document({
    sections:[{
      properties:{
        page:{
          size:{width:11906, height:16838},
          margin:{top:1440,bottom:1440,left:1800,right:1800}
        }
      },
      children
    }]
  });

  const blob = await Packer.toBlob(doc);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${(activeTab||"result").replace(".pdf","")}.docx`;
  a.click();
  showToast("✅ تم إنشاء ملف DOCX!", "ok");
}
// منع المتصفح من فتح الملف عند الإفلات خارج المنطقة
document.addEventListener("dragover", e=>e.preventDefault());
document.addEventListener("drop",     e=>{ if(e.target !== dropZone && !dropZone.contains(e.target)) e.preventDefault(); });

applyLang(lang);
updateRunBtn();
</script>
